<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jeu du Snake Rétro Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Retro Snake Game</h1>
        <div class="score-box">
            Score : <span id="score">0</span> | Meilleur : <span id="high-score">0</span>
        </div>
        
        <button id="pause-btn">Pause</button>
        
        <!-- Le Canvas s'adaptera en CSS -->
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="game-over-screen" class="hidden">
            <h2>Game Over !</h2>
            <button id="restart-btn">Rejouer</button>
        </div>

        <!-- NOUVEAU : Manette tactile pour smartphones -->
        <div class="touch-controls">
            <div class="row">
                <button id="btn-up" class="ctrl-btn">▲</button>
            </div>
            <div class="row">
                <button id="btn-left" class="ctrl-btn">◀</button>
                <div class="spacer"></div>
                <button id="btn-right" class="ctrl-btn">▶</button>
            </div>
            <div class="row">
                <button id="btn-down" class="ctrl-btn">▼</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
